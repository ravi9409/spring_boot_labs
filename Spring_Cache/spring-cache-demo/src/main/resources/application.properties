# ============================================================
# APPLICATION
# ============================================================
spring.application.name=enterprise-cache-demo
server.port=8080

# ============================================================
# DATABASE (H2 for demo — replace with PostgreSQL/MySQL in prod)
# ============================================================
spring.datasource.url=jdbc:h2:mem:cachedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# ============================================================
# REDIS (L2 Distributed Cache)
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=4
spring.data.redis.lettuce.pool.max-wait=2000ms

# ============================================================
# CAFFEINE L1 CACHE SPECS (name=maxSize,expireAfterWrite)
# ============================================================
cache.caffeine.specs.products=maximumSize=500,expireAfterWrite=10m
cache.caffeine.specs.users=maximumSize=1000,expireAfterWrite=5m
cache.caffeine.specs.categories=maximumSize=100,expireAfterWrite=30m

# ============================================================
# REDIS L2 CACHE TTL (in minutes)
# ============================================================
cache.redis.ttl.products=60
cache.redis.ttl.users=30
cache.redis.ttl.categories=120
cache.redis.default-ttl=60

# ============================================================
# HTTP CACHE (in seconds)
# ============================================================
cache.http.max-age.products=300
cache.http.max-age.categories=3600

# ============================================================
# ACTUATOR — Expose cache metrics
# ============================================================
management.endpoints.web.exposure.include=health,metrics,caches,prometheus
management.endpoint.caches.enabled=true
management.metrics.tags.application=${spring.application.name}

# ============================================================
# LOGGING
# ============================================================
logging.level.com.example.cache=DEBUG
logging.level.org.springframework.cache=TRACE
