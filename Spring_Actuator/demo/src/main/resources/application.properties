spring.application.name=my-jlc-app
server.port=12345
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jlcdb
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
logging.level.root=INFO
logging.pattern.console=%-5level %logger{36} - %msg%n
#management.endpoints.web.exposure.include=health,info,beans
management.endpoints.web.exposure.include=*
management.endpoint.shutdown.enabled=true
management.endpoint.auditevents.enabled=false
management.endpoint.caches.enabled=false
management.endpoints.web.exposure.exclude=conditions,configprops,scheduledtasks
management.endpoint.health.show-details = always
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
info.app.developer=Srinivas Dande
info.app.company=Java Learning Center